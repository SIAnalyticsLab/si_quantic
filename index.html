<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SI Analytics R Data Wrangling Quest</title>
<style>
:root{
  --navy:#0F172A; --teal:#0F766E; --gold:#FACC15; --white:#FFFFFF;
  --bg:#F8FAFC; --mid:#64748B; --success:#166534; --error:#B91C1C; --info:#1D4ED8;
  --radius:10px; --shadow:0 1px 3px rgba(15,23,42,.08),0 1px 2px rgba(15,23,42,.06);
  --shadow-lg:0 10px 25px -5px rgba(15,23,42,.1),0 8px 10px -6px rgba(15,23,42,.08);
  --trans:200ms ease;
  --focus: 0 0 0 3px rgba(15,118,110,.35);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:var(--bg); color:var(--navy); line-height:1.5;
  -webkit-font-smoothing:antialiased;
}
#app{min-height:100vh;display:flex;flex-direction:column;}
a{color:var(--teal);}
code, pre, .mono{font-family:"SF Mono",SFMono-Regular,Consolas,"Liberation Mono",Menlo,monospace;}
h1,h2,h3,h4{margin:0 0 .5em 0;line-height:1.25;}
p{margin:0 0 1em 0;}
button{font-family:inherit;}
.visually-hidden{
  position:absolute!important;width:1px;height:1px;padding:0;margin:-1px;
  overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;
}
:focus-visible{outline:none;box-shadow:var(--focus);border-radius:6px;}
@media (prefers-reduced-motion: reduce){
  *{animation-duration:.001ms!important;animation-iteration-count:1!important;transition-duration:.001ms!important;scroll-behavior:auto!important;}
}

/* ===== TOP NAV ===== */
.topnav{
  position:sticky; top:0; z-index:50; background:var(--white);
  border-bottom:1px solid #E2E8F0; padding:.6rem 1rem;
  display:flex; align-items:center; gap:1rem; flex-wrap:wrap;
}
.topnav .brand{display:flex;align-items:center;gap:.5rem;font-weight:700;color:var(--navy);text-decoration:none;font-size:.95rem;}
.topnav .brand img{height:28px;width:28px;border-radius:6px;object-fit:contain;background:var(--navy);}
.topnav .spacer{flex:1;}
.topnav .progress-wrap{flex:1;min-width:120px;max-width:280px;display:flex;flex-direction:column;gap:2px;}
.progress-track{height:8px;background:#E2E8F0;border-radius:99px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--teal),#14b8a6);border-radius:99px;transition:width 300ms ease;}
.progress-label{font-size:.68rem;color:var(--mid);}
.xp-pill{
  display:flex;align-items:center;gap:.35rem;background:var(--bg);border:1px solid #E2E8F0;
  border-radius:99px;padding:.3rem .7rem;font-size:.78rem;font-weight:600;color:var(--navy);
  white-space:nowrap;
}
.xp-pill .dot{width:8px;height:8px;border-radius:99px;background:var(--gold);}
.level-pill{
  font-size:.7rem;font-weight:600;color:var(--teal);background:#F0FDFA;border:1px solid #99F6E4;
  padding:.3rem .6rem;border-radius:99px;white-space:nowrap;
}
.icon-btn{
  border:1px solid #E2E8F0;background:var(--white);border-radius:8px;height:36px;width:36px;
  display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--navy);
  transition:background var(--trans),border-color var(--trans);
}
.icon-btn:hover{background:var(--bg);border-color:var(--teal);}

/* ===== MAIN LAYOUT ===== */
main{flex:1;display:flex;flex-direction:column;}
.screen{max-width:900px;margin:0 auto;padding:2rem 1.25rem 4rem;width:100%;animation:fadeUp 260ms ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:.5rem;
  padding:.7rem 1.4rem;border-radius:8px;font-weight:600;font-size:.92rem;cursor:pointer;
  border:1px solid transparent;transition:transform var(--trans),background var(--trans),box-shadow var(--trans);
  min-height:44px;
}
.btn:active{transform:scale(.98);}
.btn-primary{background:var(--teal);color:var(--white);}
.btn-primary:hover{background:#0d6058;box-shadow:var(--shadow);}
.btn-primary:disabled{background:#94A3B8;cursor:not-allowed;}
.btn-gold{background:var(--gold);color:var(--navy);}
.btn-gold:hover{background:#e8bb0e;}
.btn-outline{background:var(--white);border-color:#CBD5E1;color:var(--navy);}
.btn-outline:hover{border-color:var(--teal);color:var(--teal);}
.btn-text{background:transparent;color:var(--mid);padding:.5rem .8rem;}
.btn-text:hover{color:var(--navy);text-decoration:underline;}
.btn-sm{padding:.45rem .9rem;font-size:.82rem;min-height:36px;}
.btn-row{display:flex;gap:.75rem;flex-wrap:wrap;margin-top:1.5rem;align-items:center;}

.card{
  background:var(--white);border:1px solid #E2E8F0;border-radius:var(--radius);
  padding:1.5rem;box-shadow:var(--shadow);
}
.card + .card{margin-top:1rem;}
.eyebrow{
  text-transform:uppercase;letter-spacing:.06em;font-size:.72rem;font-weight:700;
  color:var(--teal);margin-bottom:.4rem;display:block;
}
.badge-chip{
  display:inline-flex;align-items:center;gap:.35rem;background:#FEF9C3;color:#713F12;
  border:1px solid #FDE68A;border-radius:99px;padding:.25rem .6rem;font-size:.72rem;font-weight:700;
}

/* ===== WELCOME ===== */
.hero{
  text-align:center;padding:3rem 1.25rem 2rem;background:
    radial-gradient(circle at 20% 20%, rgba(15,118,110,.08), transparent 45%),
    radial-gradient(circle at 80% 0%, rgba(250,204,21,.10), transparent 40%),
    var(--white);
  border-bottom:1px solid #E2E8F0;
}
.hero img.logo{height:56px;margin-bottom:1rem;}
.hero h1{font-size:1.9rem;color:var(--navy);}
.hero p.lead{max-width:560px;margin:0 auto 1.5rem;color:var(--mid);font-size:1.02rem;}
.journey-row{display:grid;grid-template-columns:repeat(4,1fr);gap:.75rem;max-width:760px;margin:1.5rem auto;}
.journey-step{
  background:var(--bg);border:1px solid #E2E8F0;border-radius:var(--radius);padding:.9rem .6rem;
  font-size:.78rem;font-weight:600;color:var(--navy);
}
.journey-step .num{
  width:26px;height:26px;border-radius:99px;background:var(--teal);color:#fff;display:flex;
  align-items:center;justify-content:center;margin:0 auto .5rem;font-size:.78rem;
}
.meta-row{display:flex;gap:1.25rem;justify-content:center;flex-wrap:wrap;color:var(--mid);font-size:.85rem;margin-top:1rem;}
.name-field{max-width:340px;margin:1.5rem auto 0;text-align:left;}
.name-field label{display:block;font-size:.82rem;font-weight:600;margin-bottom:.35rem;color:var(--navy);}
input[type=text], textarea, select{
  width:100%;padding:.65rem .8rem;border:1px solid #CBD5E1;border-radius:8px;font-size:.92rem;
  font-family:inherit;background:#fff;color:var(--navy);
}
input[type=text]:focus, textarea:focus, select:focus{border-color:var(--teal);}
.storage-note{font-size:.76rem;color:var(--mid);margin-top:1rem;max-width:480px;margin-left:auto;margin-right:auto;}

/* ===== LEARNING MAP ===== */
.map-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:1rem;margin-top:1.5rem;}
.lesson-tile{
  background:var(--white);border:1px solid #E2E8F0;border-radius:var(--radius);padding:1.25rem;
  box-shadow:var(--shadow);position:relative;transition:transform var(--trans),box-shadow var(--trans);
  cursor:pointer;text-align:left;width:100%;
}
.lesson-tile:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg);}
.lesson-tile[data-locked="true"]{opacity:.55;cursor:not-allowed;}
.lesson-tile[data-locked="true"]:hover{transform:none;box-shadow:var(--shadow);}
.lesson-tile .status-tag{
  position:absolute;top:.9rem;right:.9rem;font-size:.65rem;font-weight:700;padding:.2rem .5rem;
  border-radius:99px;text-transform:uppercase;letter-spacing:.03em;
}
.status-tag.completed{background:#DCFCE7;color:var(--success);}
.status-tag.active{background:#DBEAFE;color:var(--info);}
.status-tag.locked{background:#F1F5F9;color:var(--mid);}
.lesson-tile h3{font-size:1.05rem;margin-bottom:.25rem;}
.lesson-tile .lesson-icon{
  width:42px;height:42px;border-radius:10px;background:var(--navy);color:#fff;display:flex;
  align-items:center;justify-content:center;margin-bottom:.75rem;font-size:1.2rem;
}
.mastery-track{height:6px;background:#E2E8F0;border-radius:99px;margin-top:.75rem;overflow:hidden;}
.mastery-fill{height:100%;background:var(--teal);}
.mastery-label{font-size:.72rem;color:var(--mid);margin-top:.35rem;}

/* ===== LESSON EXPERIENCE ===== */
.lesson-header{display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap;margin-bottom:1.25rem;}
.lesson-header .title-block .eyebrow{margin-bottom:.15rem;}
.screen-progress{display:flex;gap:4px;margin-bottom:1.5rem;flex-wrap:wrap;}
.screen-dot{height:6px;flex:1;min-width:10px;background:#E2E8F0;border-radius:99px;}
.screen-dot.done{background:var(--teal);}
.screen-dot.current{background:var(--gold);}

.objective-list{list-style:none;padding:0;margin:0;}
.objective-list li{
  display:flex;gap:.6rem;padding:.5rem 0;border-bottom:1px solid #F1F5F9;font-size:.92rem;
}
.objective-list li:last-child{border-bottom:none;}
.objective-list li::before{content:"✓";color:var(--teal);font-weight:700;}

.code-panel{
  background:var(--navy);color:#E2E8F0;border-radius:8px;padding:1rem 1.1rem;font-size:.85rem;
  overflow-x:auto;white-space:pre;position:relative;
}
.code-panel .kw{color:#7DD3FC;}
.code-panel .fn{color:#FDE68A;}
.code-panel .str{color:#86EFAC;}
.code-panel .cm{color:#94A3B8;font-style:italic;}
.code-editor{
  background:var(--navy);color:#F1F5F9;border:1px solid #1E293B;border-radius:8px;
  padding:1rem 1.1rem;font-size:.85rem;width:100%;min-height:90px;resize:vertical;
}
.code-editor:focus{border-color:var(--teal);}

.data-table-wrap{overflow-x:auto;border:1px solid #E2E8F0;border-radius:8px;}
table.data-table{border-collapse:collapse;width:100%;font-size:.82rem;min-width:420px;}
table.data-table th{
  background:var(--navy);color:#fff;text-align:left;padding:.55rem .7rem;position:sticky;top:0;
  font-weight:600;white-space:nowrap;
}
table.data-table td{padding:.5rem .7rem;border-bottom:1px solid #F1F5F9;white-space:nowrap;}
table.data-table tr:nth-child(even){background:#F8FAFC;}
table.data-table td.col-selected, table.data-table th.col-selected{background:#CCFBF1!important;}
table.data-table tr.row-selected td{background:#FEF9C3!important;}
.table-col-btn{background:none;border:none;cursor:pointer;color:inherit;font:inherit;padding:0;text-align:left;width:100%;}
.table-row-btn{background:none;border:none;cursor:pointer;font:inherit;width:100%;text-align:left;padding:.5rem .7rem;}

.option-grid{display:grid;gap:.6rem;margin-top:1rem;}
.option-btn{
  display:flex;align-items:center;gap:.7rem;text-align:left;padding:.85rem 1rem;border:1.5px solid #E2E8F0;
  border-radius:8px;background:#fff;cursor:pointer;font-size:.92rem;transition:border-color var(--trans),background var(--trans);
  min-height:44px;
}
.option-btn:hover{border-color:var(--teal);}
.option-btn .opt-marker{
  width:22px;height:22px;border-radius:6px;border:1.5px solid #CBD5E1;flex:none;display:flex;
  align-items:center;justify-content:center;font-size:.72rem;color:#fff;font-weight:700;
}
.option-btn.selected{border-color:var(--teal);background:#F0FDFA;}
.option-btn.selected .opt-marker{background:var(--teal);border-color:var(--teal);}
.option-btn.correct{border-color:var(--success);background:#F0FDF4;}
.option-btn.correct .opt-marker{background:var(--success);border-color:var(--success);}
.option-btn.incorrect{border-color:var(--error);background:#FEF2F2;}
.option-btn.incorrect .opt-marker{background:var(--error);border-color:var(--error);}
.option-btn:disabled{cursor:default;}

.feedback-box{
  margin-top:1rem;padding:.9rem 1rem;border-radius:8px;font-size:.88rem;display:flex;gap:.6rem;
  align-items:flex-start;border:1px solid;
}
.feedback-box.success{background:#F0FDF4;border-color:#BBF7D0;color:#14532D;}
.feedback-box.error{background:#FEF2F2;border-color:#FECACA;color:#7F1D1D;}
.feedback-box.info{background:#EFF6FF;border-color:#BFDBFE;color:#1E3A8A;}
.feedback-box .fb-icon{font-weight:700;flex:none;}

.hint-box{
  margin-top:.75rem;padding:.75rem 1rem;background:#FFFBEB;border:1px dashed #FDE68A;border-radius:8px;
  font-size:.85rem;color:#713F12;
}
.action-row{display:flex;gap:.6rem;flex-wrap:wrap;margin-top:1rem;}

.drag-list{list-style:none;padding:0;margin:1rem 0;display:flex;flex-direction:column;gap:.5rem;}
.drag-item{
  background:#fff;border:1.5px solid #E2E8F0;border-radius:8px;padding:.7rem .9rem;cursor:grab;
  display:flex;align-items:center;gap:.6rem;font-size:.88rem;user-select:none;
}
.drag-item:active{cursor:grabbing;}
.drag-item .handle{color:var(--mid);}
.drag-item.dragging{opacity:.4;}
.drag-item.over{border-color:var(--teal);}
.drag-item .reorder-btns{margin-left:auto;display:flex;gap:.25rem;}
.reorder-btns button{
  border:1px solid #E2E8F0;background:#fff;border-radius:6px;width:28px;height:28px;cursor:pointer;
}

.toast-region{position:fixed;bottom:1rem;left:50%;transform:translateX(-50%);z-index:200;display:flex;flex-direction:column;gap:.5rem;align-items:center;}
.toast{
  background:var(--navy);color:#fff;padding:.7rem 1.1rem;border-radius:8px;font-size:.85rem;
  box-shadow:var(--shadow-lg);animation:toastIn 200ms ease;display:flex;align-items:center;gap:.5rem;
}
@keyframes toastIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

.xp-flash{
  position:fixed;top:70px;right:1rem;background:var(--gold);color:var(--navy);font-weight:700;
  padding:.5rem .9rem;border-radius:99px;font-size:.82rem;z-index:200;box-shadow:var(--shadow-lg);
  animation:xpPop 1400ms ease forwards;
}
@keyframes xpPop{0%{opacity:0;transform:translateY(-6px) scale(.9);}15%{opacity:1;transform:translateY(0) scale(1);}80%{opacity:1;}100%{opacity:0;transform:translateY(-6px);}}

footer.app-footer{border-top:1px solid #E2E8F0;background:#fff;padding:1rem 1.25rem;text-align:center;font-size:.76rem;color:var(--mid);}
footer.app-footer a{color:var(--mid);}

.recap-list{list-style:none;padding:0;margin:0;}
.recap-list li{padding:.5rem 0;border-bottom:1px solid #F1F5F9;font-size:.9rem;display:flex;gap:.5rem;}
.recap-list li::before{content:"→";color:var(--teal);font-weight:700;}

.two-col{display:grid;grid-template-columns:1fr;gap:1rem;}
@media(min-width:720px){.two-col{grid-template-columns:1fr 1fr;}}

.kbd{background:#F1F5F9;border:1px solid #CBD5E1;border-radius:4px;padding:0 .35rem;font-size:.78rem;font-family:monospace;}

.skip-link{
  position:absolute;left:-9999px;top:0;background:var(--navy);color:#fff;padding:.6rem 1rem;
  z-index:999;border-radius:0 0 8px 0;
}
.skip-link:focus{left:0;}

.completion-hero{text-align:center;padding:2rem 1rem;}
.score-ring{
  width:150px;height:150px;border-radius:99px;margin:0 auto 1rem;
  background:conic-gradient(var(--teal) calc(var(--pct,0)*1%), #E2E8F0 0);
  display:flex;align-items:center;justify-content:center;position:relative;
}
.score-ring::before{content:"";position:absolute;inset:10px;background:#fff;border-radius:99px;}
.score-ring .score-num{position:relative;font-size:1.7rem;font-weight:800;color:var(--navy);}

.certificate{
  background:#fff;border:3px solid var(--navy);border-radius:12px;padding:2.5rem 2rem;text-align:center;
  position:relative;background-image:radial-gradient(circle at 10% 10%, rgba(15,118,110,.05), transparent 40%),
  radial-gradient(circle at 90% 90%, rgba(250,204,21,.08), transparent 40%);
}
.certificate .cert-title{font-size:1.5rem;color:var(--navy);letter-spacing:.02em;margin-bottom:.25rem;}
.certificate .cert-name{font-size:2rem;color:var(--teal);margin:1rem 0;font-weight:800;}
.certificate .cert-line{width:200px;border-bottom:1.5px solid var(--navy);margin:1.5rem auto .35rem;}
@media print{
  body *{visibility:hidden;}
  #certificate-block, #certificate-block *{visibility:visible;}
  #certificate-block{position:absolute;left:0;top:0;width:100%;}
  .topnav, footer, .btn-row{display:none!important;}
}

.badge-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:.9rem;margin-top:1rem;}
.badge-card{text-align:center;padding:1rem .5rem;border:1px solid #E2E8F0;border-radius:10px;background:#fff;}
.badge-card .badge-icon{
  width:52px;height:52px;border-radius:99px;background:linear-gradient(145deg,var(--gold),#f0b90b);
  margin:0 auto .5rem;display:flex;align-items:center;justify-content:center;font-size:1.4rem;color:var(--navy);
}
.badge-card.locked .badge-icon{background:#E2E8F0;color:var(--mid);}
.badge-card .badge-name{font-size:.78rem;font-weight:700;}

.sr-live{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);}

@media(max-width:640px){
  .journey-row{grid-template-columns:repeat(2,1fr);}
  .lesson-header{flex-direction:column;align-items:flex-start;}
  .topnav{gap:.5rem;}
}
</style>
</head>
<body>
<a href="#main-content" class="skip-link">Skip to main content</a>
<div id="app"></div>
<div class="toast-region" id="toast-region" aria-live="polite"></div>
<div class="sr-live" id="sr-live" aria-live="assertive"></div>

<script>
/* =========================================================
   SI Analytics R Data Wrangling Quest
   Vanilla JS, no framework, no build step, no backend.
   ========================================================= */
(function(){
"use strict";

const STORAGE_KEY = "siAnalyticsRQuest_v1";
const LOGO_LOCAL = "assets/logo.png";
const LOGO_FALLBACK = "https://raw.githubusercontent.com/SIAnalyticsLab/si-analytics-academy/main/assets/logo.png";

/* ---------- Default state ---------- */
function defaultState(){
  return {
    version:1,
    learnerName:"",
    currentLessonId:null,
    currentScreenIndex:0,
    xpTotal:0,
    level:0,
    lessons:{
      select:{status:"active", screenIndex:0, completedScreens:{}, attempts:{}, hints:{}, badge:false, checkpointDone:false},
      filter:{status:"locked", screenIndex:0, completedScreens:{}, attempts:{}, hints:{}, badge:false, checkpointDone:false},
      mutate:{status:"locked", screenIndex:0, completedScreens:{}, attempts:{}, hints:{}, badge:false, checkpointDone:false},
      pivot:{status:"locked", screenIndex:0, completedScreens:{}, attempts:{}, hints:{}, badge:false, checkpointDone:false}
    },
    finalMission:{status:"locked", screenIndex:0, completedScreens:{}, attempts:{}, xp:0, done:false},
    completedAt:null,
    finalBadge:false
  };
}

const LEVELS = [
  {min:0, name:"Data Explorer"},
  {min:400, name:"Wrangling Apprentice"},
  {min:1000, name:"Transformation Analyst"},
  {min:1800, name:"Data Reshaping Specialist"},
  {min:2600, name:"SI Analytics Data Wrangler"}
];

function levelForXp(xp){
  let idx=0;
  for(let i=0;i<LEVELS.length;i++){ if(xp>=LEVELS[i].min) idx=i; }
  return LEVELS[idx];
}

/* ---------- Safe storage ---------- */
function loadState(){
  try{
    const raw = window.localStorage.getItem(STORAGE_KEY);
    if(!raw) return defaultState();
    const parsed = JSON.parse(raw);
    if(!parsed || typeof parsed!=="object" || parsed.version!==1){
      return defaultState();
    }
    // merge with defaults to protect against corrupted/partial data
    const d = defaultState();
    const merged = Object.assign({}, d, parsed);
    merged.lessons = Object.assign({}, d.lessons, parsed.lessons||{});
    for(const k in merged.lessons){
      merged.lessons[k] = Object.assign({}, d.lessons[k], merged.lessons[k]||{});
    }
    merged.finalMission = Object.assign({}, d.finalMission, parsed.finalMission||{});
    return merged;
  }catch(e){
    console.warn("Corrupted save detected, resetting to defaults.", e);
    return defaultState();
  }
}

function saveState(){
  try{
    window.localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }catch(e){
    console.warn("Unable to save progress.", e);
    announce("Your progress could not be saved in this browser.");
  }
}

let state = loadState();

/* ---------- Utility: announce to screen readers + toast ---------- */
function announce(msg){
  const live = document.getElementById("sr-live");
  live.textContent = "";
  setTimeout(()=>{ live.textContent = msg; }, 30);
}

function toast(msg, opts){
  opts = opts||{};
  const region = document.getElementById("toast-region");
  const el = document.createElement("div");
  el.className = "toast";
  el.setAttribute("role","status");
  el.textContent = msg;
  region.appendChild(el);
  announce(msg);
  setTimeout(()=>{ el.remove(); }, opts.duration||2600);
}

function flashXp(amount){
  if(amount<=0) return;
  const el = document.createElement("div");
  el.className = "xp-flash";
  el.textContent = "+" + amount + " XP";
  document.body.appendChild(el);
  setTimeout(()=>el.remove(), 1450);
}

/* ---------- XP / mastery helpers ---------- */
function awardXp(amount, opts){
  opts = opts || {};
  const prevLevel = levelForXp(state.xpTotal).name;
  state.xpTotal += amount;
  const newLevel = levelForXp(state.xpTotal).name;
  saveState();
  if(amount>0) flashXp(amount);
  if(newLevel!==prevLevel && !opts.silentLevelUp){
    setTimeout(()=>toast("Level up! You are now a " + newLevel + "."), 500);
  }
  renderTopNav();
}

function xpForAttempt(attemptNumber, usedHint){
  if(usedHint) return 50;
  if(attemptNumber===1) return 100;
  if(attemptNumber===2) return 70;
  return 25; // further attempts still earn a small amount, never zero, never punitive
}

function prefersReducedMotion(){

/* ---------- Shared UI builders ---------- */
function h(tag, attrs, children){
  const el = document.createElement(tag);
  attrs = attrs||{};
  for(const k in attrs){
    if(k==="class") el.className = attrs[k];
    else if(k==="html") el.innerHTML = attrs[k];
    else if(k.startsWith("on") && typeof attrs[k]==="function") el.addEventListener(k.slice(2), attrs[k]);
    else el.setAttribute(k, attrs[k]);
  }
  (children||[]).forEach(c=>{ if(c!=null) el.appendChild(typeof c==="string"?document.createTextNode(c):c); });
  return el;
}

function screenWrap(children){
  return h("div", {class:"screen"}, children);
}

/* ---------- Lesson open / lock logic ---------- */
const LESSON_ORDER = ["select","filter","mutate","pivot"];

function openLesson(id){
  state.currentLessonId = id;
  navigate("lesson", {id: id});
}

function unlockNextLesson(finishedId){
  const idx = LESSON_ORDER.indexOf(finishedId);
  if(idx>=0 && idx+1<LESSON_ORDER.length){
    const nextId = LESSON_ORDER[idx+1];
    if(state.lessons[nextId].status==="locked"){
      state.lessons[nextId].status="active";
    }
  }
  if(LESSON_ORDER.every(id=>state.lessons[id].status==="completed")){
    if(state.finalMission.status==="locked") state.finalMission.status="active";
  }
  saveState();
}

function getLessonState(id){ return state.lessons[id]; }

  }

}

  saveState();

}

  ls.hints[key] = true;
  saveState();
}

route("lesson", function(params){
  const id = params.id || state.currentLessonId;
  state.currentLessonId = id;

  if(!screens.length){

    wrap.appendChild(h("button",{class:"btn btn-outline", onclick:()=>navigate("map")},["Back to map"]));
    return wrap;
  }
  if(ls.screenIndex >= screens.length) ls.screenIndex = screens.length-1;
  const idx = ls.screenIndex;
  const screen = screens[idx];
  const meta = LESSON_META[id];

  const wrap = screenWrap([]);

  const header = h("div",{class:"lesson-header"});
  const titleBlock = h("div",{class:"title-block"});
  titleBlock.appendChild(h("span",{class:"eyebrow"},[meta.title]));

  screens.forEach((s,i)=>{
    const done = !!ls.completedScreens[screenKey(s,i)];
    dots.appendChild(h("span",{class:"screen-dot "+(done?"done":(i===idx?"current":""))}));
  });
  wrap.appendChild(dots);

  wrap.appendChild(renderScreenByType(id, screen, idx, screens));

  const nav = h("div",{class:"btn-row"});
  const backBtn = h("button",{class:"btn btn-outline", onclick:()=>{
    if(idx>0){ ls.screenIndex = idx-1; saveState(); navigate("lesson",{id:id}); }
    else navigate("map");
  }},[idx>0? "← Back":"← Exit"]);
  nav.appendChild(backBtn);

  const isLast = idx===screens.length-1;
  const nextBtn = h("button",{class:"btn btn-primary", id:"lesson-next-btn", onclick:()=>{
    if(isLast){
      finishLesson(id);
    } else {
      ls.screenIndex = idx+1; saveState(); navigate("lesson",{id:id});
    }
  }},[isLast? "Finish lesson":"Next →"]);
  nav.appendChild(nextBtn);
  wrap.appendChild(nav);

  return wrap;
});

/* =========================================================

function renderScreenByType(lessonId, screen, idx, allScreens){
  switch(screen.type){
    case "info": return renderInfoScreen(screen);
    case "objectives": return renderObjectivesScreen(screen);
    case "demo": return renderDemoScreen(screen);
    case "mcq": return renderMcqScreen(lessonId, screen, idx);
    case "mcq-multi": return renderMcqMultiScreen(lessonId, screen, idx);
    case "table-col-select": return renderTableColSelect(lessonId, screen, idx);
    case "table-row-select": return renderTableRowSelect(lessonId, screen, idx);
    case "code-predict": return renderCodePredict(lessonId, screen, idx);
    case "code-repair": return renderCodeRepair(lessonId, screen, idx);
    case "code-build": return renderCodeBuild(lessonId, screen, idx);
    case "reorder": return renderReorderScreen(lessonId, screen, idx);
    case "match": return renderMatchScreen(lessonId, screen, idx);
    default:
      return h("div",{class:"card"},[h("p",{},["Unsupported screen type: "+screen.type])]);
  }
}

function dataTable(columns, rows, opts){
  opts = opts||{};
  const wrapEl = h("div",{class:"data-table-wrap"});
  const table = h("table",{class:"data-table"});
  const thead = h("thead");
  const headRow = h("tr");
  columns.forEach(col=>{
    const isSel = opts.selectedCols && opts.selectedCols.includes(col);
    const th = h("th",{class: isSel? "col-selected":""});
    if(opts.onColClick){
      const btn = h("button",{class:"table-col-btn", onclick:()=>opts.onColClick(col)},[col]);
      th.appendChild(btn);
    } else {
      th.textContent = col;
    }
    headRow.appendChild(th);
  });
  thead.appendChild(headRow);
  table.appendChild(thead);
  const tbody = h("tbody");
  rows.forEach((row,ri)=>{
    const tr = h("tr",{class: (opts.selectedRows && opts.selectedRows.includes(ri))? "row-selected":""});
    if(opts.onRowClick){
      tr.style.cursor="pointer";
      tr.addEventListener("click", ()=>opts.onRowClick(ri));
      tr.tabIndex = 0;
      tr.setAttribute("role","button");
      tr.addEventListener("keydown",(e)=>{ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); opts.onRowClick(ri);} });
    }
    columns.forEach(col=>{
      const isSel = opts.selectedCols && opts.selectedCols.includes(col);
      tr.appendChild(h("td",{class:isSel?"col-selected":""},[String(row[col]==null?"NA":row[col])]));
    });
    tbody.appendChild(tr);
  });
  table.appendChild(tbody);
  wrapEl.appendChild(table);
  return wrapEl;
}

/* ---- Reorder (drag or button-based, keyboard accessible) ---- */
function renderReorderScreen(lessonId, screen, idx){
  const wrap = h("div",{class:"card"});
  wrap.appendChild(h("span",{class:"eyebrow"},["Reorder"]));
  wrap.appendChild(h("h3",{},[screen.question]));
  if(screen.context) wrap.appendChild(h("p",{},[screen.context]));

  let items = screen.items.slice();
  // shuffle deterministically-ish but not equal to target
  items = shuffleUnlessEqual(items, screen.target);

  const list = h("ul",{class:"drag-list"});
  const feedbackHolder = h("div");
  let submitted = false;

  function draw(){
    list.innerHTML = "";
    items.forEach((item, i)=>{
      const li = h("li",{class:"drag-item", draggable: !submitted, tabindex:"0"},[
        h("span",{class:"handle", "aria-hidden":"true"},["⠿"]),
        h("span",{},[item])
      ]);
      if(!submitted){
        li.addEventListener("dragstart", (e)=>{ li.classList.add("dragging"); e.dataTransfer.setData("text/plain", String(i)); });
        li.addEventListener("dragend", ()=> li.classList.remove("dragging"));
        li.addEventListener("dragover", (e)=>{ e.preventDefault(); li.classList.add("over"); });
        li.addEventListener("dragleave", ()=> li.classList.remove("over"));
        li.addEventListener("drop", (e)=>{
          e.preventDefault(); li.classList.remove("over");
          const from = parseInt(e.dataTransfer.getData("text/plain"),10);
          const to = i;
          const moved = items.splice(from,1)[0];
          items.splice(to,0,moved);
          draw();
        });
        const btns = h("span",{class:"reorder-btns"});
        const upBtn = h("button",{type:"button","aria-label":"Move "+item+" up", onclick:()=>{ if(i>0){ [items[i-1],items[i]]=[items[i],items[i-1]]; draw(); } }},["↑"]);
        const downBtn = h("button",{type:"button","aria-label":"Move "+item+" down", onclick:()=>{ if(i<items.length-1){ [items[i+1],items[i]]=[items[i],items[i+1]]; draw(); } }},["↓"]);
        btns.appendChild(upBtn); btns.appendChild(downBtn);
        li.appendChild(btns);
      }
      list.appendChild(li);
    });
  }
  draw();
  wrap.appendChild(list);
  wrap.appendChild(h("p",{style:"font-size:.76rem;color:var(--mid);"},["Drag items, or use the ↑ / ↓ buttons for a keyboard-friendly alternative."]));

  const checkBtn = h("button",{class:"btn btn-primary btn-sm", style:"margin-top:.5rem;"},["Check order"]);
  checkBtn.addEventListener("click", ()=>{
    const attemptNum = recordAttempt(lessonId, screen, idx);
    const correct = JSON.stringify(items)===JSON.stringify(screen.target);
    feedbackHolder.innerHTML="";
    if(correct){
      submitted = true; draw();
      const xp = xpForAttempt(attemptNum, hintWasUsed(lessonId,screen,idx));
      markScreenComplete(lessonId, screen, idx, xp);
      feedbackHolder.appendChild(feedbackEl("success", screen.explainCorrect || "That's the correct order."));
    } else {
      feedbackHolder.appendChild(feedbackEl("error", screen.explainIncorrect || "Not quite the right order yet."));
    }
  });
  wrap.appendChild(checkBtn);
  wrap.appendChild(feedbackHolder);
  return wrap;
}

function shuffleUnlessEqual(arr, target){
  let out = arr.slice();
  let tries=0;
  while(JSON.stringify(out)===JSON.stringify(target) && tries<10){
    out = out.slice().sort(()=>Math.random()-0.5);
    tries++;
  }
  return out;
}

/* ---- Match pairs ---- */
function renderMatchScreen(lessonId, screen, idx){
  const wrap = h("div",{class:"card"});
  wrap.appendChild(h("span",{class:"eyebrow"},["Match the Pairs"]));
  wrap.appendChild(h("h3",{},[screen.question]));
  if(screen.context) wrap.appendChild(h("p",{},[screen.context]));

  const pairs = screen.pairs; // [{left, right}]
  let leftSel = null;
  const matches = {}; // leftIndex -> rightIndex
  const rightShuffled = pairs.map((p,i)=>i).sort(()=>Math.random()-0.5);

  const grid = h("div",{class:"two-col"});
  const leftCol = h("div",{class:"option-grid"});
  const rightCol = h("div",{class:"option-grid"});

  function draw(){
    leftCol.innerHTML=""; rightCol.innerHTML="";
    pairs.forEach((p,li)=>{
      const matched = matches.hasOwnProperty(li);
      const btn = h("button",{class:"option-btn"+(matched?" correct":(leftSel===li?" selected":""))},[
        h("span",{class:"opt-marker"},[matched?"✓":String(li+1)]), h("span",{},[p.left])
      ]);
      if(!matched){
        btn.addEventListener("click", ()=>{ leftSel = li; draw(); });
      } else { btn.disabled = true; }
      leftCol.appendChild(btn);
    });
    rightShuffled.forEach((ri)=>{
      const alreadyMatched = Object.values(matches).includes(ri);
      const btn = h("button",{class:"option-btn"+(alreadyMatched?" correct":"")},[
        h("span",{class:"opt-marker"},[alreadyMatched?"✓":"•"]), h("span",{},[pairs[ri].right])
      ]);
      if(!alreadyMatched){
        btn.addEventListener("click", ()=>{
          if(leftSel===null) return;
          const attemptNum = recordAttempt(lessonId, screen, idx);
          if(leftSel===ri){
            matches[leftSel]=ri;
            leftSel=null;
            draw();
            if(Object.keys(matches).length===pairs.length){
              const xp = xpForAttempt(attemptNum, hintWasUsed(lessonId,screen,idx));
              markScreenComplete(lessonId, screen, idx, xp);
              feedbackHolder.innerHTML="";
              feedbackHolder.appendChild(feedbackEl("success", screen.explainCorrect || "All pairs matched correctly."));
            }
          } else {
            feedbackHolder.innerHTML="";
            feedbackHolder.appendChild(feedbackEl("error","Not a match — try again."));
            leftSel=null;
            draw();
          }
        });
      } else { btn.disabled = true; }
      rightCol.appendChild(btn);
    });
  }
  const feedbackHolder = h("div");
  draw();
  grid.appendChild(leftCol); grid.appendChild(rightCol);
  wrap.appendChild(grid);
  wrap.appendChild(feedbackHolder);
  return wrap;
}

/* =========================================================
   LENIENT R CODE VALIDATOR
   No eval(). Normalizes whitespace/pipes, checks required
   functions/args are present and forbidden patterns absent.
   ========================================================= */
function normalizeCode(code){
  return code
    .replace(/%>%/g, "|>")
    .replace(/\s+/g," ")
    .replace(/\s*\(\s*/g,"(")
    .replace(/\s*\)\s*/g,")")
    .replace(/\s*,\s*/g,", ")
    .replace(/\s*:\s*/g,":")
    .replace(/\s*\^\s*/g,"^")
    .replace(/\s*=\s*/g,"=")
    .replace(/\s*\/\s*/g,"/")
    .replace(/\s*\*\s*/g,"*")
    .replace(/\s*!\s*/g,"!")
    .trim()
    .toLowerCase();
}

function validateCode(code, validator){
  if(!validator) return {ok:true};
  const norm = normalizeCode(code);
  if(validator.mustInclude){
    for(const req of validator.mustInclude){
      const reqNorm = normalizeCode(req);
      if(!norm.includes(reqNorm)){
        return {ok:false, message: validator.missingMessage || ("Your code should include something like: "+req)};
      }
    }
  }
  if(validator.mustNotInclude){
    for(const bad of validator.mustNotInclude){
      if(norm.includes(normalizeCode(bad))){
        return {ok:false, message: validator.forbiddenMessage || ("Your code still includes: "+bad)};
      }
    }
  }
  if(validator.anyOf){
    const matches = validator.anyOf.some(alt=> norm.includes(normalizeCode(alt)));
    if(!matches){
      return {ok:false, message: validator.missingMessage || "That doesn't match an accepted correct pattern yet."};
    }
  }
  return {ok:true};
}

/* =========================================================
   LESSON 4 CONTENT: Pivoting Data
   Datasets: Gapminder infant deaths (wide) + Ebola Sierra Leone
   district/year counts (long, from a grouped summary)
   ========================================================= */
(function(){
"use strict";

const infantWideCols = ["country","x2010","x2011","x2012","x2013","x2014"];
const infantWideRows = [
  {country:"Afghanistan", x2010:74600, x2011:72000, x2012:69500, x2013:67100, x2014:64800},
  {country:"Angola", x2010:79100, x2011:76400, x2012:73700, x2013:71200, x2014:69000},
  {country:"Albania", x2010:420, x2011:384, x2012:354, x2013:331, x2014:313}
];

function pivotLongInfant(){
  const out=[];
  infantWideRows.forEach(r=>{
    ["x2010","x2011","x2012","x2013","x2014"].forEach(yr=>{
      out.push({country:r.country, year:yr, deaths_count:r[yr]});
    });
  });
  return out;
}
function pivotLongInfantClean(){
  return pivotLongInfant().map(r=>({country:r.country, year: parseInt(r.year.replace("x",""),10), deaths_count:r.deaths_count}));
}

const ebolaLongCols = ["district","year_of_onset","n"];
const ebolaLongRows = [
  {district:"Bo", year_of_onset:2014, n:397},
  {district:"Bo", year_of_onset:2015, n:209},
  {district:"Bombali", year_of_onset:2014, n:1070},
  {district:"Bombali", year_of_onset:2015, n:120},
  {district:"Bonthe", year_of_onset:2014, n:7},
  {district:"Bonthe", year_of_onset:2015, n:77}
];
function pivotWideEbola(){
  const districts = [...new Set(ebolaLongRows.map(r=>r.district))];
  return districts.map(d=>{
    const row = {district:d};
    ebolaLongRows.filter(r=>r.district===d).forEach(r=>{ row[String(r.year_of_onset)] = r.n; });
    return row;
  });
}

const screens = [];
